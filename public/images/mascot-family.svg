<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 身体 - 房子形状 -->
  <rect x="50" y="100" width="100" height="70" fill="#FED7AA" />
  <polygon points="50,100 100,50 150,100" fill="#FB923C" />

  <!-- 门 -->
  <rect x="85" y="130" width="30" height="40" fill="#92400E" rx="3" />
  <circle cx="110" cy="155" r="3" fill="#FCD34D" />

  <!-- 窗户眼睛 -->
  <rect x="65" y="115" width="25" height="25" fill="#BFDBFE" rx="3" />
  <rect x="110" y="115" width="25" height="25" fill="#BFDBFE" rx="3" />

  <!-- 眼睛瞳孔 -->
  <circle cx="77" cy="127" r="5" fill="#333" />
  <circle cx="122" cy="127" r="5" fill="#333" />
  <circle cx="79" cy="125" r="2" fill="white" />
  <circle cx="124" cy="125" r="2" fill="white" />

  <!-- 烟囱 -->
  <rect x="120" y="40" width="15" height="30" fill="#DC2626" />
  <ellipse cx="127" cy="40" rx="10" ry="5" fill="#EF4444" />

  <!-- 烟雾 -->
  <circle cx="127" cy="30" r="6" fill="#9CA3AF" opacity="0.6" />
  <circle cx="132" cy="20" r="5" fill="#9CA3AF" opacity="0.4" />

  <!-- 微笑嘴巴 -->
  <path d="M 90 180 Q 100 190 110 180" stroke="#DC2626" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- 腮红 -->
  <ellipse cx="60" cy="140" rx="10" ry="6" fill="#FCA5A5" opacity="0.5" />
  <ellipse cx="140" cy="140" rx="10" ry="6" fill="#FCA5A5" opacity="0.5" />

  <!-- 键盘装饰 -->
  <rect x="95" y="60" width="10" height="10" rx="2" fill="#22C55E" />
  <rect x="110" y="60" width="10" height="10" rx="2" fill="#22C55E" />
  <text x="98" y="68" font-size="7" fill="white" font-weight="bold">C</text>
  <text x="113" y="68" font-size="7" fill="white" font-weight="bold">V</text>
</svg>
