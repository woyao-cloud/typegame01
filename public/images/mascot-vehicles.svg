<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 小汽车身体 -->
  <rect x="40" y="100" width="120" height="50" rx="15" fill="#60A5FA" />
  <rect x="50" y="70" width="100" height="40" rx="10" fill="#60A5FA" />

  <!-- 车顶 -->
  <path d="M 55 70 L 70 45 L 130 45 L 145 70 Z" fill="#60A5FA" />

  <!-- 车窗 -->
  <ellipse cx="85" cy="60" rx="20" ry="15" fill="#DBEAFE" />
  <ellipse cx="115" cy="60" rx="20" ry="15" fill="#DBEAFE" />

  <!-- 车轮 -->
  <circle cx="65" cy="150" r="20" fill="#374151" />
  <circle cx="65" cy="150" r="12" fill="#9CA3AF" />
  <circle cx="65" cy="150" r="5" fill="#374151" />
  <circle cx="135" cy="150" r="20" fill="#374151" />
  <circle cx="135" cy="150" r="12" fill="#9CA3AF" />
  <circle cx="135" cy="150" r="5" fill="#374151" />

  <!-- 可爱眼睛（车灯） -->
  <circle cx="75" cy="115" r="12" fill="white" />
  <circle cx="125" cy="115" r="12" fill="white" />
  <circle cx="78" cy="118" r="6" fill="#333" />
  <circle cx="128" cy="118" r="6" fill="#333" />
  <circle cx="80" cy="115" r="2" fill="white" />
  <circle cx="130" cy="115" r="2" fill="white" />

  <!-- 微笑格栅 -->
  <path d="M 90 130 Q 100 140 110 130" stroke="#DC2626" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- 腮红 -->
  <ellipse cx="55" cy="120" rx="10" ry="6" fill="#FCA5A5" opacity="0.5" />
  <ellipse cx="145" cy="120" rx="10" ry="6" fill="#FCA5A5" opacity="0.5" />

  <!-- 键盘装饰 -->
  <rect x="85" y="50" width="12" height="12" rx="2" fill="#FCD34D" />
  <rect x="103" y="50" width="12" height="12" rx="2" fill="#FCD34D" />
  <text x="89" y="60" font-size="9" fill="#B45309" font-weight="bold">E</text>
  <text x="107" y="60" font-size="9" fill="#B45309" font-weight="bold">R</text>
</svg>
